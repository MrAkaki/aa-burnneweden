x-allianceauth-base: &allianceauth-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      AA_DOCKER_TAG: ${AA_DOCKER_TAG:-registry.gitlab.com/allianceauth/allianceauth/auth:v5.0.1}
  restart: unless-stopped
  env_file:
    - ./.env
  volumes:
    - ./conf/local.py:/home/allianceauth/myauth/myauth/settings/local.py
    - ./conf/celery.py:/home/allianceauth/myauth/myauth/celery.py
    - ./conf/urls.py:/home/allianceauth/myauth/myauth/urls.py
    - ./data/sqlite:/home/allianceauth/myauth/db
    - static-volume:/var/www/myauth/static
    # Mount aa-burnneweden source for editable install (parent dir = repo root)
    - ..:/app/aa-burnneweden:ro
  depends_on:
    - redis
  working_dir: /home/allianceauth/myauth/

services:
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  allianceauth_gunicorn:
    container_name: allianceauth_gunicorn
    <<: *allianceauth-base
    entrypoint:
      - sh
      - -c
      - |
        pip install -q -e /app/aa-burnneweden &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn myauth.wsgi --bind=0.0.0.0:8000 --workers=1 --timeout=120
    ports:
      - "${AA_PORT:-8000}:8000"

  allianceauth_worker:
    container_name: allianceauth_worker
    <<: *allianceauth-base
    entrypoint:
      - sh
      - -c
      - |
        pip install -q -e /app/aa-burnneweden &&
        celery -A myauth worker --pool=solo --concurrency=1
    depends_on:
      - redis
      - allianceauth_gunicorn

  allianceauth_beat:
    container_name: allianceauth_beat
    <<: *allianceauth-base
    entrypoint:
      - sh
      - -c
      - |
        pip install -q -e /app/aa-burnneweden &&
        celery -A myauth beat
    depends_on:
      - redis
      - allianceauth_gunicorn

volumes:
  redis-data:
  static-volume:
